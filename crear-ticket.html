<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Préstamo | Sport Ticket</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/crear-ticket.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <i class="fa-solid fa-dumbbell"></i>
            <span>Sport Ticket</span>
        </div>
        <nav class="sidebar-menu">
            <a href="index.html" class="active"><i class="fa-solid fa-house"></i> <span>Catálogo</span></a>
            <a href="mis-tickets.html"><i class="fa-solid fa-ticket"></i> <span>Mis Tickets</span></a>
            <a href="perfil.html"><i class="fa-solid fa-user-gear"></i> <span>Perfil</span></a>
        </nav>
        <div class="sidebar-footer"><a href="login.html"><i class="fa-solid fa-right-from-bracket"></i> Salir</a></div>
    </aside>

    <div class="main-wrapper">
        <header class="top-navbar no-search">
            <div class="user-profile">
                <span>Juan Carlos R.</span>
                <i class="fa-solid fa-circle-user user-avatar"></i>
            </div>
        </header>

        <main class="content-area ticket-content">
            <div class="profile-form ticket-form">
                <h2 class="ticket-heading">Nueva Solicitud</h2>

                <div class="ticket-product">
                    <i class="fa-solid fa-volleyball"></i>
                    <div>
                        <h3>Balón de Voleibol Professional</h3>
                        <p>FUT-01 | Deportes</p>
                    </div>
                </div>

                <form action="mis-tickets.html">
                    <div class="form-group">
                        <label>Tiempo solicitado (horas)</label>
                        <select>
                            <option>1 Hora</option>
                            <option>2 Horas</option>
                            <option>3 Horas</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Uso destinado</label>
                        <input type="text" placeholder="Ej: Clase de deporte, Torneo libre...">
                    </div>

                    <button type="submit" class="btn-add ticket-submit">CONFIRMAR SOLICITUD DE TICKET</button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
