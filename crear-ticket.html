<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solicitar Préstamo | Sport Ticket</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo"><img src="img/logo.png" alt="Logo"></div>
        <nav class="sidebar-menu">
            <a href="index.html" class="active"><i class="fa-solid fa-house"></i> <span>Catálogo</span></a>
            <a href="mis-tickets.html"><i class="fa-solid fa-ticket"></i> <span>Mis Tickets</span></a>
            <a href="perfil.html"><i class="fa-solid fa-user-gear"></i> <span>Perfil</span></a>
        </nav>
        <div class="sidebar-footer"><a href="login.html"><i class="fa-solid fa-right-from-bracket"></i> Salir</a></div>
    </aside>

    <div class="main-wrapper">
        <header class="top-navbar">
            <div class="search-bar"></div>
            <div class="user-profile">
                <span>Juan Carlos R.</span>
                <i class="fa-solid fa-circle-user" style="font-size: 1.5rem; color: var(--primary);"></i>
            </div>
        </header>

        <main class="content-area" style="display: flex; justify-content: center; align-items: flex-start; padding: 60px 20px;">
            
            <div class="profile-form" style="width: 100%; max-width: 480px; background: #111; padding: 40px; border-radius: 20px; border: 1px solid #2a2a2a;">
                
                <h2 style="color: var(--primary); margin-bottom: 30px; text-align: center; font-size: 1.6rem;">Nueva Solicitud</h2>
                
                <div style="display: flex; align-items: center; gap: 20px; background: #000; padding: 15px; border-radius: 10px; margin-bottom: 30px;">
                    <i class="fa-solid fa-volleyball" style="font-size: 2.5rem; color: var(--primary);"></i>
                    <div>
                        <h3 style="color: #fff; font-size: 1.1rem;">Balón de Voleibol Professional</h3>
                        <p style="color: #777; font-size: 0.9rem;">FUT-01 | Deportes</p>
                    </div>
                </div>

                <form action="mis-tickets.html">
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="color: var(--primary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Tiempo solicitado (horas)</label>
                        <select style="width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; margin-top: 5px;">
                            <option>1 Hora</option>
                            <option>2 Horas</option>
                            <option>3 Horas</option>
                        </select>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 30px;">
                        <label style="color: var(--primary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Uso destinado</label>
                        <input type="text" placeholder="Ej: Clase de deporte, Torneo libre..." style="background: #000; border: 1px solid #333; margin-top: 5px;">
                    </div>
                    
                    <button type="submit" class="btn-add" style="height: 50px; font-size: 1rem; letter-spacing: 1px;">CONFIRMAR SOLICITUD DE TICKET</button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
