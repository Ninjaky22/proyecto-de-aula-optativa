<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Sport Ticket</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/perfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <i class="fa-solid fa-dumbbell"></i>
            <span>Sport Ticket</span>
        </div>
        <nav class="sidebar-menu">
            <a href="index.html"><i class="fa-solid fa-house"></i> <span>Catálogo</span></a>
            <a href="mis-tickets.html"><i class="fa-solid fa-ticket"></i> <span>Mis Tickets</span></a>
            <a href="perfil.html" class="active"><i class="fa-solid fa-user-gear"></i> <span>Perfil</span></a>
        </nav>
        <div class="sidebar-footer">
            <a href="login.html"><i class="fa-solid fa-right-from-bracket"></i> Salir</a>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="top-navbar no-search">
            <div class="user-profile">
                <span>Juan Carlos R.</span>
                <i class="fa-solid fa-circle-user user-avatar"></i>
            </div>
        </header>

        <main class="content-area profile-content">
            <div class="profile-form">
                <div class="profile-header">
                    <i class="fa-solid fa-user-astronaut"></i>
                    <h2>Juan Carlos Restrepo</h2>
                    <p>Ingeniería de Software - FET</p>
                </div>

                <form>
                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" value="Juan Carlos Restrepo Penagos" readonly>
                    </div>

                    <div class="form-group">
                        <label>Correo Institucional</label>
                        <input type="email" value="juan.restrepo@fet.edu.co">
                    </div>

                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" value="********">
                    </div>

                    <button type="button" class="btn-add profile-submit">ACTUALIZAR DATOS</button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
