<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Rentas | Sport Ticket</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/user-rentals.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: #000;">
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon"><i class="fa-solid fa-store"></i></div>
                <div><h2 style="font-size: 1.1rem;">Sport Ticket</h2><p style="color: var(--muted); font-size: 0.8rem;">Portal de Usuario</p></div>
            </div>
            <nav class="nav-menu">
                <a href="user-catalog.html" class="nav-item"><i class="fa-solid fa-shopping-bag"></i> Dashboard</a>
                <a href="user-rentals.html" class="nav-item active"><i class="fa-solid fa-calendar-days"></i> Mis Rentas</a>
                <a href="user-cart.html" class="nav-item"><i class="fa-solid fa-cart-shopping"></i> Carrito</a>
                <a href="user-profile.html" class="nav-item"><i class="fa-solid fa-user"></i> Mi Perfil</a>
            </nav>
            <div class="sidebar-footer">
                <a href="login.html" class="nav-item logout"><i class="fa-solid fa-right-from-bracket"></i> Salir</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1 style="font-size: 1.6rem;">Mis Rentas Activas</h1>
            </header>
            <div class="page-container">
                <div class="card rental-card border-active">
                    <div class="rental-main-info" style="display: flex; justify-content: space-between; align-items: center; padding: 25px;">
                        <div style="display: flex; gap: 20px; align-items: center;">
                            <div class="item-visual"><i class="fa-solid fa-futbol text-primary"></i></div>
                            <div>
                                <h3 style="color: #fff; margin-bottom: 5px;">Balón de Fútbol Nike</h3>
                                <p style="color: var(--muted); font-size: 0.85rem;">Alquilado el: 15 Abr, 2026</p>
                                <p style="color: #facc15; font-size: 0.9rem; font-weight: 600; margin-top: 5px;">
                                    <i class="fa-regular fa-calendar-check"></i> Vence el: 20 Abr, 2026
                                </p>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-size: 1.6rem; font-weight: bold; color: var(--primary);">$45.000</div>
                            <div style="font-size: 0.8rem; color: var(--muted);">COP Total</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
