<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="auth-container">
    <div class="auth-card">
        <h2 style="color: var(--primary); margin-bottom: 10px;">Recuperar acceso</h2>
        <p style="color: var(--text-muted); margin-bottom: 25px;">Te enviaremos un código a tu correo</p>
        
        <form action="login.html">
            <input type="email" placeholder="Correo electrónico" required>
            <button type="submit" class="btn-add">Enviar código</button>
        </form>

        <div class="auth-links">
            <a href="login.html">Cancelar y volver</a>
        </div>
    </div>
</body>
</html>
