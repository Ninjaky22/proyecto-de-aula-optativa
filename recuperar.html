<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña | Sport Ticket</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/recuperar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="recovery-wrapper">
        <div class="recovery-card">
            
            <div class="logo-box">
                <i class="fa-solid fa-lock"></i>
            </div>
            
            <h2>Recuperar Contraseña</h2>
            <p class="subtitle">Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu acceso a la plataforma.</p>

            <form action="login.html">
                
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" placeholder="Correo electrónico" required>
                </div>

                <button type="submit" class="btn-recovery">Enviar Enlace</button>
            </form>

            <div class="back-link">
                <a href="login.html"><i class="fa-solid fa-arrow-left"></i> Volver al inicio de sesión</a>
            </div>
            
        </div>
    </div>
</body>
</html>
