<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Sport Ticket</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-container">
    <div class="auth-card">
        <i class="fa-solid fa-dumbbell auth-icon"></i>
        <h2 style="color: var(--primary); margin-bottom: 5px;">Sport Ticket</h2>
        <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 0.9rem;">FET - Ingeniería de Software</p>
        
        <form action="index.html">
            <input type="email" placeholder="Correo institucional" required>
            <input type="password" placeholder="Contraseña" required>
            <button type="submit" class="btn-add">Ingresar</button>
        </form>

        <div class="auth-links">
            <a href="registro.html">¿No tienes cuenta? Regístrate aquí</a>
            <a href="recuperar.html">¿Olvidaste tu contraseña?</a>
        </div>
    </div>
</body>
</html>
