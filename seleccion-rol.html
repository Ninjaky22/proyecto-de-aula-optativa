<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Selección de Rol | Sport Ticket</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/seleccion-rol.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="selection-wrapper">
        <div class="selection-container">
            
            <div class="logo-box">
                <i class="fa-solid fa-dumbbell"></i>
            </div>
            <h1>Selecciona tu Rol</h1>
            <p class="subtitle">Elige cómo deseas ingresar a la plataforma.</p>

            <div class="role-grid">
                
                <a href="dashboard.html" class="role-card">
                    <div class="role-icon">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <h3>Administrador</h3>
                    <p>Gestión de inventario, aprobación de rentas, análisis de métricas y control general del sistema.</p>
                    <button class="btn-role">Entrar como Admin</button>
                </a>

                <a href="user-catalog.html" class="role-card">
                    <div class="role-icon">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <h3>Cliente</h3>
                    <p>Explora el catálogo, renta artículos deportivos, reporta incidencias y gestiona tu cuenta.</p>
                    <button class="btn-role">Entrar como Cliente</button>
                </a>

            </div>
        </div>
    </div>
</body>
</html>
