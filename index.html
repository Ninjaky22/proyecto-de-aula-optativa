<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo | Sport Ticket</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo"><img src="img/logo.png" alt="Logo"></div>
        <nav class="sidebar-menu">
            <a href="index.html" class="active"><i class="fa-solid fa-house"></i> <span>Catálogo</span></a>
            <a href="mis-tickets.html"><i class="fa-solid fa-ticket"></i> <span>Mis Tickets</span></a>
            <a href="perfil.html"><i class="fa-solid fa-user-gear"></i> <span>Perfil</span></a>
        </nav>
        <div class="sidebar-footer">
            <a href="login.html"><i class="fa-solid fa-right-from-bracket"></i> Salir</a>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="top-navbar">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass" style="color: #666;"></i>
                <input type="text" placeholder="¿Qué implemento buscas?">
            </div>
            <div class="user-profile">
                <span>Juan Carlos R.</span>
                <i class="fa-solid fa-circle-user" style="font-size: 1.5rem; color: var(--primary);"></i>
            </div>
        </header>

        <main class="content-area" style="padding: 60px 40px;">
            <h1 class="page-title" style="margin-bottom: 40px;">Implementos Deportivos</h1>
            
            <div class="product-grid">
                <div class="product-card" style="padding: 30px; border-radius: 15px;">
                    <i class="fa-solid fa-volleyball" style="color: var(--primary); font-size: 3.5rem;"></i>
                    <h3 style="margin-top: 15px;">Balón de Voleibol</h3>
                    <p style="margin-bottom: 20px;">FUT-01 | Disponible</p>
                    <a href="crear-ticket.html"><button class="btn-add">Solicitar Ticket</button></a>
                </div>

                <div class="product-card" style="padding: 30px; border-radius: 15px;">
                    <i class="fa-solid fa-table-tennis-paddle-ball" style="color: var(--primary); font-size: 3.5rem;"></i>
                    <h3 style="margin-top: 15px;">Kit Ping Pong</h3>
                    <p style="margin-bottom: 20px;">PP-04 | Disponible</p>
                    <a href="crear-ticket.html"><button class="btn-add">Solicitar Ticket</button></a>
                </div>

                <div class="product-card" style="padding: 30px; border-radius: 15px;">
                    <i class="fa-solid fa-basketball" style="color: #444; font-size: 3.5rem;"></i>
                    <h3 style="margin-top: 15px;">Balón Baloncesto</h3>
                    <p style="margin-bottom: 20px;">BK-02 | En uso</p>
                    <button class="btn-add" style="background: #222; color: #555; cursor: not-allowed;">No disponible</button>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
