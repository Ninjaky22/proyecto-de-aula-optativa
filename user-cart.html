<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carrito | Sport Ticket</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/user-cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: #000;">
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon"><i class="fa-solid fa-store"></i></div>
                <div><h2 style="font-size: 1.1rem;">Sport Ticket</h2><p style="color: var(--muted); font-size: 0.8rem;">Portal de Usuario</p></div>
            </div>
            <nav class="nav-menu">
                <a href="user-catalog.html" class="nav-item"><i class="fa-solid fa-shopping-bag"></i> Dashboard</a>
                <a href="user-rentals.html" class="nav-item"><i class="fa-solid fa-calendar-days"></i> Mis Rentas</a>
                <a href="user-cart.html" class="nav-item active"><i class="fa-solid fa-cart-shopping"></i> Carrito</a>
                <a href="user-profile.html" class="nav-item"><i class="fa-solid fa-user"></i> Mi Perfil</a>
            </nav>
            <div class="sidebar-footer">
                <a href="login.html" class="nav-item logout"><i class="fa-solid fa-right-from-bracket"></i> Salir</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header"><h1 style="font-size: 1.6rem;">Carrito de Compra</h1></header>
            <div class="page-container">
                <div class="cart-grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px;">
                    <div class="cart-items">
                        <div class="card" style="display: flex; justify-content: space-between; align-items: center; padding: 20px;">
                            <div style="display: flex; gap: 15px; align-items: center;">
                                <h3 style="color: #fff;">Balón de Fútbol Nike</h3>
                            </div>
                            <div style="display: flex; align-items: center; gap: 20px;">
                                <div style="display: flex; align-items: center; gap: 10px; background: #111; padding: 5px 12px; border-radius: 8px; border: 1px solid var(--border);">
                                    <button style="background: none; border: none; color: var(--primary); cursor: pointer;"><i class="fa-solid fa-minus"></i></button>
                                    <span style="color: #fff; font-weight: bold;">1</span>
                                    <button style="background: none; border: none; color: var(--primary); cursor: pointer;"><i class="fa-solid fa-plus"></i></button>
                                </div>
                                <div style="color: var(--primary); font-weight: bold;">$15.000 COP</div>
                                <button style="background: none; border: none; color: #ff4444; cursor: pointer; font-size: 1.1rem;"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                        </div>
                    </div>

                    <div class="cart-summary">
                        <div class="card">
                            <h3 style="margin-bottom: 20px; color: #fff; border-bottom: 1px solid var(--border); padding-bottom: 10px;">Resumen de Pedido</h3>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 12px; color: var(--muted);">
                                <span>Subtotal</span>
                                <span>$15.000 COP</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 12px; color: var(--muted);">
                                <span>Seguro de Equipo</span>
                                <span>$2.500 COP</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border);">
                                <span style="font-weight: bold; color: #fff;">Total a Pagar</span>
                                <span style="color: var(--primary); font-weight: bold; font-size: 1.5rem;">$17.500 COP</span>
                            </div>
                            <button class="btn btn-primary" style="width: 100%; margin-top: 25px; padding: 15px;">Confirmar y Pagar</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
