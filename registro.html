<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Cuenta | Sport Ticket</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/registro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/auth.js" defer></script>
</head>
<body>
    <div class="signup-wrapper">
        <div class="signup-card">
            
            <div class="logo-box">
                <i class="fa-solid fa-dumbbell"></i>
            </div>
            
            <h2>Crea tu cuenta</h2>
            <p class="subtitle">Únete a la plataforma líder en gestión y renta de implementos deportivos.</p>

            <form onsubmit="registrarUsuario(event)">
                
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="reg-nombre" placeholder="Nombre completo" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="reg-email" placeholder="Correo electrónico" required>
                </div>

                <div class="input-group" style="position: relative;">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="reg-password" placeholder="Contraseña" required style="padding-right: 45px;">
                    <i class="fa-solid fa-eye" id="icon-reg-pass" onclick="togglePassword('reg-password', 'icon-reg-pass')" style="position: absolute; right: 15px; left: auto; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--muted); z-index: 10; pointer-events: auto;"></i>
                </div>

                <div class="input-group" style="position: relative;">
                    <i class="fa-solid fa-shield-check"></i>
                    <input type="password" id="reg-confirm" placeholder="Confirmar contraseña" required style="padding-right: 45px;">
                    <i class="fa-solid fa-eye" id="icon-reg-confirm" onclick="togglePassword('reg-confirm', 'icon-reg-confirm')" style="position: absolute; right: 15px; left: auto; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--muted); z-index: 10; pointer-events: auto;"></i>
                </div>

                <div class="terms-check">
                    <label class="checkbox-container">
                        <input type="checkbox" required>
                        <span class="checkmark"></span>
                        Acepto los <a href="#">Términos y Condiciones</a>
                    </label>
                </div>

                <button type="submit" class="btn-signup">Registrarse</button>
            </form>

            <div class="login-link">
                ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a>
            </div>
            
        </div>
    </div>
</body>
</html>
