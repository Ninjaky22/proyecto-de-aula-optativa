<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Sport Ticket</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/registro.css">
</head>
<body class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Crear Cuenta</h2>
        <p class="auth-subtitle">Ingresa tus datos de estudiante</p>

        <form action="login.html">
            <input type="text" placeholder="Nombre completo" required>
            <input type="email" placeholder="Correo FET" required>
            <input type="password" placeholder="Contraseña" required>
            <button type="submit" class="btn-add">Registrarme</button>
        </form>

        <div class="auth-links">
            <a href="login.html">Volver al inicio de sesión</a>
        </div>
    </div>
</body>
</html>
